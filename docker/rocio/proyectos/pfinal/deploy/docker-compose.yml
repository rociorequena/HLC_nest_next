services:
  web:
    build:
      context: ${CONTEXTO}
      dockerfile: ./dockerfiles/final-next/Dockerfile
    container_name: final-next
    image: rocio/final-next
    ports:
      - "8080:80"
    env_file:
      - ./.env
    volumes:
      - ./logs:/root/logs
    networks:
      netrociofinal:
        ipv4_address: ${IP_WEB}
networks:
  netrociofinal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${SUBNET}
