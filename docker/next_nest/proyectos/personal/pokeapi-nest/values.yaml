app:
  name: webnest
  image:
    repository: rocio21/nestfinal
    tag: latest
    pullPolicy: Always
  # containerPort: 3001   
  container: 
    name: webnest
    port: 3001
    replicas: 3
  service:
    type: NodePort
    port: 3001
    nodePort: 30021
    sshPort: 3457
    sshTargetPort: 3457
    sshNodePort: 30457
  ingress:
    host: proyectohelm.reqgon.es
    port: 3001

postgres:
  name: postgre
  image:
    repository: rocio21/postgre
    tag: "latest"
    pullPolicy: Always
  service:
    port: 5432
  auth:
    database: nest
    username: postgres
    password: usuario
  # Este es el volumen donde se guardarán los datos de PostgreSQL. Si quieres usar un volumen persistente
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: "microk8s-hostpath"   # pon aquí tu storageClass si quieres fijarla