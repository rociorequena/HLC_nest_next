apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.container.name }}-nginx-service
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.app.container.name }}-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: 80
