apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.app.container.name }}-html-config
  namespace: {{ .Release.Namespace }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;

        location = /pelicula.html {
            try_files /pelicula.html =404;
        }

        location = /pokemon.html {
            try_files /pokemon.html =404;
        }

        # Redirects from /path to /path.html just in case
        location = /pelicula {
            rewrite ^/pelicula$ /pelicula.html;
        }

        location = /pokemon {
            rewrite ^/pokemon$ /pokemon.html;
        }

        error_page 404 /404.html;
    }

  pelicula.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Gestión de Películas - ASIR</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body { background-color: #f8f9fa; padding: 20px; }
            .movie-table-card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
            .header-blue { background: #0d6efd; color: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        </style>
    </head>
    <body>
        <div class="container movie-table-card">
            <h2 class="header-blue text-center">Tabla de Películas</h2>
            
            <div class="row g-2 mb-4 p-3 bg-light rounded border">
                <div class="col-md-4">
                    <input type="text" id="filterTitle" class="form-control" placeholder="Filtrar por título...">
                </div>
                <div class="col-md-3">
                    <input type="number" id="startYear" class="form-control" placeholder="Año Desde" value="1990">
                </div>
                <div class="col-md-3">
                    <input type="number" id="endYear" class="form-control" placeholder="Año Hasta" value="2026">
                </div>
                <div class="col-md-2">
                    <button onclick="cargarPelis()" class="btn btn-primary w-100">Aplicar Filtro</button>
                </div>
            </div>

            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Director</th>
                        <th>Año</th>
                        <th>Minutos</th>
                    </tr>
                </thead>
                <tbody id="listaPelis"></tbody>
            </table>
        </div>

        <script>
            async function cargarPelis() {
                const t = document.getElementById('filterTitle').value;
                const s = document.getElementById('startYear').value || 1900;
                const e = document.getElementById('endYear').value || 2026;
                
                // NOTA: Usar URL relativa en lugar de localhost para que funcione con Ingress
                const res = await fetch(`/peliculas/filter?title=${t}&start=${s}&end=${e}`);
                const data = await res.json();
                
                document.getElementById('listaPelis').innerHTML = data.map(m => `
                    <tr>
                        <td>${m.id}</td>
                        <td><strong>${m.title}</strong></td>
                        <td>${m.director}</td>
                        <td>${m.year}</td>
                        <td>${m.length_minutes}</td>
                    </tr>
                `).join('');
            }
            window.onload = cargarPelis;
        </script>
    </body>
    </html>

  pokemon.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Pokeapi </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body { background-color: #f4f7f6; padding: 30px; }
            .poke-card { 
                background: white; border: 1px solid #eee; border-radius: 15px; 
                padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }
            .type-badge { 
                background-color: #ff5722; color: white; padding: 5px 15px; 
                border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem;
            }
            .poke-img-container { text-align: center; margin-bottom: 15px; height: 150px; display: flex; justify-content: center; align-items: center; }
            .poke-img { max-height: 100%; max-width: 100%; object-fit: contain; }
            .stat-row { display: flex; align-items: center; margin-bottom: 8px; }
            .stat-label { width: 80px; font-weight: bold; color: #444; }
            .stat-value { width: 40px; text-align: right; margin-right: 15px; }
            .progress { flex-grow: 1; height: 12px; background-color: #e9ecef; border-radius: 10px; }
            .progress-bar { background-color: #007bff; border-radius: 10px; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 class="text-center mb-5" style="color: #ff5722;">Pokeapi</h1>

            <div class="card p-4 shadow-sm mb-5">
                <div class="row g-3">
                    <div class="col-md-4"><input type="text" id="pName" class="form-control" placeholder="Nombre..."></div>
                    <div class="col-md-3"><input type="text" id="pType" class="form-control" placeholder="Tipo..."></div>
                    <div class="col-md-3"><input type="number" id="pMinHp" class="form-control" placeholder="Mínimo HP"></div>
                    <div class="col-md-2"><button onclick="fetchPokemon()" class="btn btn-warning w-100 text-white">Buscar</button></div>
                </div>
            </div>
            <div id="pokemon-grid" class="row"></div>
        </div>

        <script>
            function getBarWidth(value) {
                return (value / 200) * 100;
            }

            async function fetchPokemon() {
                const name = document.getElementById('pName').value;
                const type = document.getElementById('pType').value;
                const minHp = document.getElementById('pMinHp').value || 0;

                // NOTA: Usar URL relativa en lugar de localhost para que funcione con Ingress
                const response = await fetch(`/pokemon/filter?name=${name}&type=${type}&minHp=${minHp}`);
                const data = await response.json();

                let contenedor = document.getElementById('pokemon-grid');
                contenedor.innerHTML = ''; 

                data.forEach(p => {
                    const nombreLimpio = p.name.toLowerCase().trim();
                    const imageUrl = `https://img.pokemondb.net/artwork/large/${nombreLimpio}.jpg`;

                    contenedor.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="poke-card shadow-sm">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h5 class="mb-0">#${p.id} : ${p.name}</h5>
                                    <span class="type-badge">${p.type}</span>
                                </div>

                                <div class="poke-img-container">
                                    <img src="${imageUrl}" class="poke-img" alt="${p.name}">
                                </div>
                                
                                <div class="stats-section">
                                    <div class="stat-row">
                                        <span class="stat-label">HP</span>
                                        <span class="stat-value">${p.hp}</span>
                                        <div class="progress"><div class="progress-bar" style="width: ${getBarWidth(p.hp)}%"></div></div>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Attack</span>
                                        <span class="stat-value">${p.attack}</span>
                                        <div class="progress"><div class="progress-bar" style="width: ${getBarWidth(p.attack)}%"></div></div>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Defense</span>
                                        <span class="stat-value">${p.defense}</span>
                                        <div class="progress"><div class="progress-bar" style="width: ${getBarWidth(p.defense)}%"></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            window.onload = fetchPokemon;
        </script>
    </body>
    </html>
