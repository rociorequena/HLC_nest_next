apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.container.name }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
  rules:
  - host: {{ .Values.app.ingress.host }}
    http:
      paths:
      - path: /pelicula.html
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.app.container.name }}-nginx-service
            port:
              number: 80
      - path: /pokemon.html
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.app.container.name }}-nginx-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.app.container.name }}-service
            port:
              number: {{ .Values.app.ingress.port }}