apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-ies-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: instituto-next
  template:
    metadata:
      labels:
        app: instituto-next
    spec:
      containers:
      - name: container-next
        image: imagen-next-final:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: next-ies-service
spec:
  type: NodePort
  selector:
    app: instituto-next
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32226
      